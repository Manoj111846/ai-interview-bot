<h2>AI Interview</h2>

<p id="question"></p>

<button onclick="startInterview()">Start Interview</button>

<textarea id="answerBox"></textarea>

<button onclick="startListening()">🎤 Speak</button>

<button onclick="nextQuestion()">Next</button>

<form id="resultForm" action="/evaluate" method="POST"></form>

<script src="/static/camera.js"></script>

<script>

let questions=[
{% for q in questions %}
"{{q}}",
{% endfor %}
];

let answers=[];
let currentQuestion=0;

function speak(text){

let speech=new SpeechSynthesisUtterance(text);

speechSynthesis.speak(speech);

}

function startInterview(){

currentQuestion=0;

askQuestion();

}

function askQuestion(){

if(currentQuestion<questions.length){

let q=questions[currentQuestion];

document.getElementById("question").innerText=q;

speak(q);

}else{

submitInterview();

}

}

function startListening(){

const recognition=new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.onresult=function(event){

document.getElementById("answerBox").value=event.results[0][0].transcript;

};

recognition.start();

}

function nextQuestion(){

let ans=document.getElementById("answerBox").value;

answers.push(ans);

currentQuestion++;

askQuestion();

}

function submitInterview(){

let form=document.getElementById("resultForm");

answers.forEach(function(ans){

let input=document.createElement("input");

input.type="hidden";

input.name="answers";

input.value=ans;

form.appendChild(input);

});

form.submit();

}

</script>
