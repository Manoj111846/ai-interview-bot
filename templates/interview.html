<!DOCTYPE html>
<html>

<head>
<title>AI Interview</title>

<style>
body{
font-family:Arial;
text-align:center;
}

textarea{
width:500px;
height:120px;
}

video{
border:3px solid black;
margin-top:20px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

#feedbackBox{
margin-top:20px;
padding:15px;
border:2px solid #333;
width:60%;
margin-left:auto;
margin-right:auto;
display:none;
background:#f5f5f5;
}
</style>

</head>

<body>

<h2>AI Interview</h2>

<h3>⏱ Time Left: <span id="timer">60</span> seconds</h3>

<h3 id="question"></h3>

<textarea id="answerBox" placeholder="Your answer"></textarea>

<br><br>

<!-- ✅ BUTTONS -->
<button onclick="startListening()">🎤 Speak</button>
<button id="submitBtn" onclick="submitAnswer()">Submit</button>
<button onclick="goNext()">⏭ Skip / Next</button>

<hr>

<div id="feedbackBox"></div>

<h2>Camera Monitoring</h2>

<video id="camera" width="400" height="300" autoplay muted playsinline></video>

<p id="faceStatus">Checking face...</p>

<form id="resultForm" action="/evaluate" method="POST"></form>

<script src="{{ url_for('static', filename='camera.js') }}"></script>

<script>

let questions = {{ questions | tojson }};
let answers = [];
let currentQuestion = 0;

let time = 60;
let timerInterval;

/* START INTERVIEW */
function startInterview(){
currentQuestion = 0;
askQuestion();
}

/* ASK QUESTION */
function askQuestion(){

if(currentQuestion < questions.length){

let q = questions[currentQuestion];

document.getElementById("question").innerText = q;
document.getElementById("answerBox").value = "";
document.getElementById("feedbackBox").style.display = "none";

/* SPEAK QUESTION */
let speech = new SpeechSynthesisUtterance(q);
speech.lang = "en-US";

window.speechSynthesis.cancel();
window.speechSynthesis.speak(speech);

/* AFTER SPEECH */
speech.onend = function(){
startListening();
startTimer();
};

}else{
submitInterview();
}

}

/* TIMER */
function startTimer(){

time = 60;
document.getElementById("timer").innerText = time;

clearInterval(timerInterval);

timerInterval = setInterval(function(){

time--;
document.getElementById("timer").innerText = time;

if(time <= 0){
clearInterval(timerInterval);

/* AUTO SUBMIT */
submitAnswer();
}

},1000);

}

/* SUBMIT ANSWER */
async function submitAnswer(){

clearInterval(timerInterval);
window.speechSynthesis.cancel();

let ans = document.getElementById("answerBox").value;

if(ans.trim() === ""){
ans = "No answer given";
}

document.getElementById("submitBtn").disabled = true;

answers.push(ans);

/* SEND TO BACKEND */
let response = await fetch("/check_answer",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
index:currentQuestion,
answer:ans
})
});

let data = await response.json();

/* SHOW FEEDBACK */
let feedbackBox = document.getElementById("feedbackBox");
feedbackBox.style.display = "block";
feedbackBox.innerText = data.feedback;

/* SPEAK FEEDBACK */
let speech = new SpeechSynthesisUtterance(data.feedback);
speech.lang="en-US";

speech.onend = function(){
document.getElementById("submitBtn").disabled = false;
};

window.speechSynthesis.speak(speech);

}

/* NEXT / SKIP */
function goNext(){

clearInterval(timerInterval);
window.speechSynthesis.cancel();

let ans = document.getElementById("answerBox").value;

/* IF EMPTY → MARK SKIPPED */
if(ans.trim() === ""){
ans = "Skipped";
}

answers.push(ans);

currentQuestion++;
askQuestion();

}

/* FINAL SUBMIT */
function submitInterview(){

let form = document.getElementById("resultForm");

answers.forEach(function(ans){
let input = document.createElement("input");
input.type="hidden";
input.name="answers";
input.value=ans;
form.appendChild(input);
});

form.submit();

}

/* VOICE INPUT */
function startListening(){

const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang="en-US";
recognition.start();

recognition.onresult=function(event){
document.getElementById("answerBox").value =
event.results[0][0].transcript;
};

}

/* AUTO START */
window.onload = startInterview;

</script>

</body>
</html>
