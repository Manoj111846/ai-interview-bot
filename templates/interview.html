<!DOCTYPE html>
<html>

<head>
<title>AI Voice Interview</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h2>AI Voice Interview</h2>

<p id="question"></p>

<button onclick="startInterview()">Start Interview</button>

<br><br>

<textarea id="answerBox" rows="4" cols="60"></textarea>

<br><br>

<button onclick="startListening()">🎤 Speak Answer</button>

<button onclick="nextQuestion()">Next Question</button>

<form id="resultForm" action="/evaluate" method="POST"></form>

<script>

let questions = [
{% for question in questions %}
"{{ question }}",
{% endfor %}
];

let answers = [];
let currentQuestion = 0;

function speak(text){

let speech = new SpeechSynthesisUtterance(text);
speech.lang="en-US";
speechSynthesis.speak(speech);

}

function startInterview(){

currentQuestion = 0;
answers = [];

askQuestion();

}

function askQuestion(){

if(currentQuestion < questions.length){

let q = questions[currentQuestion];

document.getElementById("question").innerText = q;

document.getElementById("answerBox").value = "";

speak(q);

}else{

submitInterview();

}

}

function startListening(){

const recognition = new webkitSpeechRecognition();

recognition.lang="en-US";

recognition.onresult=function(event){

let answer = event.results[0][0].transcript;

document.getElementById("answerBox").value = answer;

};

recognition.start();

}

function nextQuestion(){

let answer = document.getElementById("answerBox").value;

answers.push(answer);

currentQuestion++;

askQuestion();

}

function submitInterview(){

let form = document.getElementById("resultForm");

answers.forEach(function(ans){

let input = document.createElement("input");

input.type="hidden";
input.name="answers";
input.value=ans;

form.appendChild(input);

});

form.submit();

}

</script>

</body>

</html>
