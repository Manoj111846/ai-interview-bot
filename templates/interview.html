<!DOCTYPE html>
<html>

<head>

<title>AI Interview</title>

</head>

<body>

<h2>AI Interview Started</h2>

<h4>⏱ Time Left: <span id="timer">60</span></h4>

<p id="question"></p>

<button onclick="startInterview()">Start Interview</button>

<textarea id="answerBox" rows="4" cols="60"></textarea>

<br><br>

<button onclick="startListening()">🎤 Speak Answer</button>

<button onclick="nextQuestion()">Next Question</button>

<form id="resultForm" action="/evaluate" method="POST"></form>

<script>

let questions = [
{% for question in questions %}
"{{question}}",
{% endfor %}
];

let answers = [];
let currentQuestion = 0;

function speak(text){

let speech = new SpeechSynthesisUtterance(text);
speechSynthesis.speak(speech);

}

function startInterview(){

currentQuestion = 0;
askQuestion();

}

function askQuestion(){

if(currentQuestion < questions.length){

let q = questions[currentQuestion];

document.getElementById("question").innerText = q;

speak(q);

}else{

submitInterview();

}

}

function startListening(){

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.onresult = function(event){

let answer = event.results[0][0].transcript;

document.getElementById("answerBox").value = answer;

};

recognition.start();

}

function nextQuestion(){

let ans = document.getElementById("answerBox").value;

answers.push(ans);

currentQuestion++;

askQuestion();

}

function submitInterview(){

let form = document.getElementById("resultForm");

answers.forEach(function(ans){

let input = document.createElement("input");

input.type="hidden";
input.name="answers";
input.value=ans;

form.appendChild(input);

});

form.submit();

}

let time = 60;

setInterval(function(){

if(time > 0){

time--;

document.getElementById("timer").innerText = time;

}

},1000);

</script>

</body>
</html>
